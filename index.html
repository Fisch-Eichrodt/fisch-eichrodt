<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fisch Eichrodt</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #fff;
    color: #222;
}

.menu {
    position: fixed;
    top: 20px;
    right: 20px;
    font-size: 30px;
    cursor: pointer;
}

.nav {
    position: fixed;
    top: 0;
    right: -250px;
    width: 250px;
    height: 100%;
    background: #fff;
    box-shadow: -2px 0 10px rgba(0,0,0,0.1);
    transition: 0.3s;
    padding: 50px 20px;
}

.nav a {
    display: block;
    margin: 20px 0;
    text-decoration: none;
    color: #000;
}

.nav.active {
    right: 0;
}

section {
    padding: 80px 20px;
    max-width: 1000px;
    margin: auto;
}

.slider {
    display: flex;
    overflow-x: auto;
    gap: 20px;
}

.slider img {
    width: 300px;
    border-radius: 10px;
}

h1, h2 {
    text-align: center;
}
</style>
</head>

<body>

<div class="menu" onclick="toggleMenu()">☰</div>

<div class="nav" id="nav">
    <a href="#home">Startseite</a>
    <a href="#about">Über uns</a>
    <a href="#contact">Wegbeschreibung</a>
</div>

<section id="home">
    <h1>Fisch Eichrodt</h1>
    <h2>Unsere Fischplatten</h2>

    <div class="slider">
        <img src="assets/plate-large-1.jpeg">
        <img src="assets/plate-large-2.jpeg">
        <img src="assets/plate-large-3.jpeg">
        <img src="assets/plate-canapes.jpeg">
    </div>

    <p style="text-align:center; margin-top:20px;">
        Jede Platte ist individuell anpassbar – wir beraten Sie gerne persönlich.
    </p>
</section>

<section id="about">
    <h2>Über uns</h2>
    <img src="assets/newspaper.jpeg" style="width:100%; border-radius:10px;">
</section>

<section id="contact">
    <h2>Wegbeschreibung</h2>
    <p style="text-align:center;">
        Tonndorfer Hauptstraße 76<br>
        22045 Hamburg
    </p>

    <p style="text-align:center;">
        <a href="https://www.google.com/maps?q=Tonndorfer+Hauptstraße+76+Hamburg" target="_blank">
            → In Google Maps öffnen
        </a>
    </p>
</section>

<script>
function toggleMenu() {
    document.getElementById("nav").classList.toggle("active");
}
</script>

</body>
</html>
